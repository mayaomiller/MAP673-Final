<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>USA Historic Sites</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Esri Leaflet -->
<script src="https://unpkg.com/esri-leaflet/dist/esri-leaflet.js"></script>


<style>
  #map {
    height: 100vh;
    width: 100%;
  }
</style>
</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([39, -98], 4);

//Base Map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

//Map Layer
var nrhpLayer = L.esri.dynamicMapLayer({
  url: "https://mapservices.nps.gov/arcgis/rest/services/cultural_resources/nrhp_locations/MapServer",
  opacity: 0.7
}).addTo(map);

// CLICK IDENTIFY
map.on("click", function(e){

L.esri.identifyFeatures({
  url: "https://mapservices.nps.gov/arcgis/rest/services/cultural_resources/nrhp_locations/MapServer"
})
.on(map)
.at(e.latlng)
.tolerance(5)
.run(function(error, featureCollection){

  if (featureCollection.features.length > 0){

    var props = featureCollection.features[0].properties;

    var popupContent =
    "<b>" + (props.RESOURCE_NAME || "Historic Site") + "</b><br>" +
        "State: " + (props.STATE || "Unknown") + "<br>" +
        "County: " + (props.COUNTY || "Unknown");

    L.popup()
      .setLatLng(e.latlng)
      .setContent(popupContent)
      .openOn(map);

  }

});

});

</script>

</body>
</html>
